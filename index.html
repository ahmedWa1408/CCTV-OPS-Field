<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTV Field System</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Cairo", sans-serif;
    }

    body {
      background: #0b0f1a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* خلفية نيون */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 20%, #6c5ce7 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, #00d2ff 0%, transparent 40%);
      opacity: 0.4;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    .header {
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
    }

    .header span {
      color: #00d2ff;
    }

    /* كرت زجاجي */
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .big-number {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(45deg, #6c5ce7, #00d2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-top: 10px;
      text-align: center;
      font-size: 16px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(45deg, #6c5ce7, #00d2ff);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .back {
      margin-top: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #planPage {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- الصفحة الأولى -->
  <div id="homePage">
    <div class="header">
      <h1>نظام الحركة الميدانية <span>CCTV</span></h1>
    </div>

    <div class="card">
      <div class="title">ادخل رقم الخطة</div>
      <div class="subtitle">يرجى إدخال رقم الخطة للمتابعة</div>

      <div class="big-number">01</div>

      <input type="number" id="planNumber" placeholder="رقم الخطة">

      <button class="btn" onclick="openPlan()">متابعة</button>
    </div>
  </div>

  <!-- الصفحة الثانية -->
  <div id="planPage">
    <div class="card">
      <div class="title" id="planTitle">الخطة</div>

      <button class="btn back" onclick="backHome()">رجوع</button>
    </div>
  </div>

</div>

<script>
  const plans = {
    1: { name: "مسار 1" },
    2: { name: "مسار 2" }
  };

  function openPlan() {
    const val = document.getElementById("planNumber").value;

    if (plans[val]) {
      document.getElementById("homePage").style.display = "none";
      document.getElementById("planPage").style.display = "block";
      document.getElementById("planTitle").innerText =
        "الخطة رقم " + val + " - " + plans[val].name;
    } else {
      alert("رقم الخطة غير موجود");
    }
  }

  function backHome() {
    document.getElementById("homePage").style.display = "block";
    document.getElementById("planPage").style.display = "none";
  }
</script>

</body>
</html>
