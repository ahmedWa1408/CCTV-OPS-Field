<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام الحركة الميدانية CCTV</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      font-family: Tahoma, Arial;
      margin: 0;
      background: #f4f6f9;
      text-align: center;
    }

    #homePage, #planPage {
      padding: 20px;
    }

    h1 {
      color: #1f3b57;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #1f3b57;
      color: white;
      border: none;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    th {
      background: #1f3b57;
      color: white;
    }

    a {
      color: #1f3b57;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- الصفحة الرئيسية -->
  <div id="homePage">
    <h1>نظام الحركة الميدانية CCTV</h1>

    <input type="number" id="planNumber" placeholder="أدخل رقم الخطة">
    <br>
    <button onclick="openPlan()">دخول الخطة</button>
  </div>

  <!-- صفحة الخطة -->
  <div id="planPage" style="display:none;">

    <h2 id="planTitle"></h2>

    <table>
      <thead>
        <tr>
          <th>رمز الموقع</th>
          <th>نوع الوحدة</th>
          <th>الموقع</th>
          <th>الحالة</th>
          <th>ملاحظات</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

    <br>
    <button onclick="backHome()">رجوع</button>

  </div>

  <!-- ربط ملفات المشروع -->
  <script src="data/plans.js"></script>
  <script src="app.js"></script>

</body>
</html>
