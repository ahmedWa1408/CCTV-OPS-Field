<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTV System</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Cairo", sans-serif;
    }

    body {
      background: #070A12;
      color: white;
      overflow: hidden;
    }

    /* ===== شاشة التحميل ===== */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1a1f3a, #070A12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #c084fc;
      text-shadow: 0 0 20px #a855f7;
    }

    .loading-box {
      width: 250px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 20px;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg,#a855f7,#22d3ee);
      animation: load 3s forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    /* ===== الصفحة الرئيسية ===== */
    #app {
      display: none;
      height: 100vh;
      padding: 20px;
      background: radial-gradient(circle at top, #11162a, #070A12);
    }

    .card {
      margin-top: 60px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .number {
      font-size: 55px;
      margin: 20px 0;
      background: linear-gradient(45deg,#a855f7,#22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      text-align: center;
      margin-top: 10px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg,#a855f7,#22d3ee);
      color: white;
      font-weight: bold;
    }

    .back {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<!-- شاشة التحميل -->
<div id="splash">
  <div class="logo">TAHAKOM</div>
  <div>جاري التحميل...</div>

  <div class="loading-box">
    <div class="loading-bar"></div>
  </div>
</div>

<!-- التطبيق -->
<div id="app">

  <!-- الصفحة الرئيسية -->
  <div id="home">
    <div class="card">
      <h1>مرحباً بك</h1>
      <p>في نظام الحركة الميدانية CCTV</p>

      <div class="number">01</div>

      <input type="number" id="planNumber" placeholder="ادخل رقم الخطة">

      <button onclick="openPlan()">متابعة</button>
    </div>
  </div>

  <!-- صفحة الخطة -->
  <div id="planPage" style="display:none;">
    <div class="card">
      <h1 id="title">الخطة</h1>
      <button class="back" onclick="backHome()">رجوع</button>
    </div>
  </div>

</div>

<script>
  // تشغيل شاشة التحميل ثم فتح التطبيق
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 3000);

  const plans = {
    1: { name: "مسار 1" },
    2: { name: "مسار 2" }
  };

  function openPlan() {
    const val = document.getElementById("planNumber").value;

    if (plans[val]) {
      document.getElementById("home").style.display = "none";
      document.getElementById("planPage").style.display = "block";

      document.getElementById("title").innerText =
        "الخطة رقم " + val + " - " + plans[val].name;
    } else {
      alert("رقم الخطة غير موجود");
    }
  }

  function backHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("planPage").style.display = "none";
  }
</script>

</body>
</html>
