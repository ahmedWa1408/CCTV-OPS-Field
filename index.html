<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحكم - شاشة الافتتاحية</title>
    <style>
        /* تعريف الألوان والمتغيرات للوضعين الداكن والفاتح */
        :root {
            --bg-color: #05050c;
            --card-bg: rgba(10, 10, 25, 0.7);
            --text-color: #ffffff;
            --primary-neon: #a855f7;
            --secondary-neon: #06b6d4;
            --border-color: rgba(6, 182, 212, 0.2);
            --podium-glow: rgba(168, 85, 247, 0.4);
        }

        [data-theme="light"] {
            --bg-color: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-color: #1f2937;
            --primary-neon: #7c3aed;
            --secondary-neon: #0891b2;
            --border-color: rgba(8, 145, 178, 0.3);
            --podium-glow: rgba(124, 58, 237, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
            position: relative;
        }

        /* زر تحويل المظهر (داكن / فاتح) */
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 10;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* حاوية الشاشة الافتتاحية */
        .splash-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out forwards;
        }

        /* لوحة الترحيب العلوية */
        .welcome-panel {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .welcome-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .welcome-subtitle {
            font-size: 0.95rem;
            color: var(--secondary-neon);
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .welcome-desc {
            font-size: 0.85rem;
            opacity: 0.7;
            line-height: 1.6;
        }

        /* منطقة الهولوغرام والشعار والمجسم السفلي */
        .hologram-display {
            width: 100%;
            height: 380px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* لوحة الشعار الزجاجية الخلفية */
        .logo-glass-panel {
            width: 85%;
            height: 75%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            position: absolute;
            top: 10px;
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        /* الشعار الرقمي المتحرك */
        .logo-wrapper {
            position: absolute;
            top: 25%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: floatLogo 4s ease-in-out infinite;
        }

        /* الأشكال المربّعة المستوحاة من شعار تحكم */
        .logo-icon {
            width: 80px;
            height: 80px;
            position: relative;
            margin-bottom: 15px;
        }

        .pixel {
            position: absolute;
            background: var(--secondary-neon);
            border-radius: 4px;
            box-shadow: 0 0 15px var(--secondary-neon);
        }
        .p1 { width: 25px; height: 25px; top: 0; left: 25px; background: var(--primary-neon); box-shadow: 0 0 15px var(--primary-neon); }
        .p2 { width: 20px; height: 20px; top: 10px; left: 55px; opacity: 0.7; }
        .p3 { width: 30px; height: 30px; top: 30px; left: 10px; }
        .p4 { width: 25px; height: 25px; top: 40px; left: 45px; background: var(--primary-neon); box-shadow: 0 0 15px var(--primary-neon); }

        .logo-text-main {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-neon);
            text-shadow: 0 0 20px var(--primary-neon);
            letter-spacing: 2px;
        }

        .logo-text-sub {
            font-size: 1.1rem;
            color: var(--secondary-neon);
            letter-spacing: 6px;
            margin-top: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--secondary-neon);
        }

        /* منصة العرض السفلية الدائرية (Podium) */
        .podium-base {
            width: 85%;
            height: 60px;
            background: #111122;
            border-radius: 50%;
            border: 3px solid #222244;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,0.8),
                0 0 30px var(--podium-glow);
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .podium-ring {
            width: 85%;
            height: 70%;
            border-radius: 50%;
            border: 2px solid var(--secondary-neon);
            box-shadow: 0 0 15px var(--secondary-neon);
        }

        /* شعاع الليزر الهولوغرافي العمودي */
        .hologram-beam {
            position: absolute;
            bottom: 40px;
            width: 70%;
            height: 200px;
            background: linear-gradient(to top, var(--podium-glow), transparent);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            z-index: 2;
            opacity: 0.6;
            pointer-events: none;
            animation: pulseBeam 2s infinite alternate;
        }

        /* شريط التحميل السفلي */
        .loading-section {
            width: 80%;
            text-align: center;
            margin-top: 10px;
        }

        .loading-text {
            font-size: 0.85rem;
            margin-bottom: 8px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            box-shadow: 0 0 10px var(--secondary-neon);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .progress-percentage {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.6;
        }

        /* الكي-فريمز للحركات التفاعلية الفخمة */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseBeam {
            0% { opacity: 0.4; transform: scaleX(0.95); }
            100% { opacity: 0.7; transform: scaleX(1.05); }
        }
    </style>
</head>
<body>

    <!-- زر تبديل الوضع الداكن والفاتح -->
    <button class="theme-toggle" id="themeBtn">الوضع الفاتح</button>

    <div class="splash-container">
        <!-- لوحة الترحيب العلوية -->
        <div class="welcome-panel">
            <h1 class="welcome-title">مرحباً بك</h1>
            <p class="welcome-subtitle">في نظام الحركة الميدانية لقسم التشغيل CCTV</p>
            <p class="welcome-desc">نظام متكامل لإدارة ومتابعة خطط الحركة الميدانية بدقة وسهولة واحترافية.</p>
        </div>

        <!-- منطقة الشعار المستقبلي والدعم السفلي -->
        <div class="hologram-display">
            <div class="logo-glass-panel"></div>
            
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <div class="pixel p1"></div>
                    <div class="pixel p2"></div>
                    <div class="pixel p3"></div>
                    <div class="pixel p4"></div>
                </div>
                <div class="logo-text-main">تحكم</div>
                <div class="logo-text-sub">TAHAKOM</div>
            </div>

            <div class="hologram-beam"></div>

            <div class="podium-base">
                <div class="podium-ring"></div>
            </div>
        </div>

        <!-- شريط التحميل التفاعلي -->
        <div class="loading-section">
            <div class="loading-text" id="statusText">جاري التحميل..</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-percentage" id="progressPercent">0%</div>
