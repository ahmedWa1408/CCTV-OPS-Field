<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحكم - نظام الحركة الميدانية</title>
    <!-- ربط ملف التصميم المطور -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- زر تبديل الوضع الداكن والفاتح -->
    <button class="theme-toggle" id="themeBtn">الوضع الفاتح</button>

    <!-- طبقة تأثير الوميض الفخم قبل الانتقال -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="splash-container">
        <!-- لوحة الترحيب العلوية المتطابقة مع الكلام بالصورة تماماً -->
        <div class="welcome-panel">
            <h1 class="welcome-title">مرحباً بك</h1>
            <p class="welcome-subtitle">في نظام الحركة الميدانيه لقسم التشغيل CCTV</p>
            <p class="welcome-desc">نظام متكامل لإدارة ومتابعة خطط الحركة الميدانية<br>بدقة وسهولة واحترافية</p>
        </div>

        <!-- منطقة المنصة والهولوغرام والشعار الدقيق والنبضات الضوئية -->
        <div class="hologram-display">
            <!-- اللوحة الزجاجية الخلفية المضيئة -->
            <div class="logo-glass-panel"></div>
            
            <!-- هالة الإضاءة الدائرية حول الشعار -->
            <div class="logo-glow-ring"></div>
            
            <!-- الشعار الرقمي المتطابق مع الصورة -->
            <div class="logo-wrapper">
                <!-- الأشكال المربعة والشبكة المستوحاة من الشعار بدقة -->
                <div class="logo-icon-grid">
                    <div class="pixel px-purple-1"></div>
                    <div class="pixel px-purple-2"></div>
                    <div class="pixel px-purple-3"></div>
                    <div class="pixel px-purple-4"></div>
                    <div class="pixel px-cyan-1"></div>
                    <div class="pixel px-cyan-2"></div>
                    <div class="pixel px-cyan-3"></div>
                    <div class="pixel px-cyan-4"></div>
                    <div class="connection-line"></div>
                </div>
                <!-- الخطوط والنصوص بدقة تامة -->
                <div class="logo-text-main">تحكم</div>
                <div class="logo-text-sub">TAHAKOM</div>
            </div>

            <!-- شعاع الليزر الصاعد من المنصة -->
            <div class="hologram-beam"></div>

            <!-- المنصة الدائرية المستقبلية المضيئة في الأسفل (Podium) -->
            <div class="podium-base">
                <div class="podium-inner-ring"></div>
                <div class="podium-core-glow"></div>
            </div>
        </div>

        <!-- منطقة شريط التحميل والنسبة المئوية -->
        <div class="loading-section">
            <div class="loading-text" id="statusText">جاري التحميل..</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-percentage" id="progressPercent">0%</div>
        </div>
    </div>

    <!-- ربط ملف الحركة والتشغيل المطور -->
    <script src="script.js"></script>
</body>
</html>
